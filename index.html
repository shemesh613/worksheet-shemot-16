<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דף עבודה - שמות פרק ט"ז</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rubik',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;direction:rtl;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-x:hidden}

.header{text-align:center;padding:20px 16px 10px;color:#fff}
.header h1{font-size:2em;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.header h2{font-size:1.1em;font-weight:600;opacity:.85;margin-top:4px}

.main{max-width:600px;width:100%;padding:0 16px 30px}

/* Camera */
.cam-box{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border-radius:18px;padding:14px;margin-bottom:16px;text-align:center;border:2px solid rgba(255,255,255,.3)}
.cam-wrap{position:relative;display:inline-block;border-radius:14px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.3)}
#vid{width:280px;height:210px;border-radius:14px;transform:scaleX(-1);display:block;background:#111;object-fit:cover}
#overlay{position:absolute;top:0;left:0;width:280px;height:210px;border-radius:14px;transform:scaleX(-1);pointer-events:none}
.gest{margin-top:10px;font-size:1.2em;font-weight:700;color:#fff;min-height:32px}
.cbtn{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a1a2e;border:none;padding:10px 26px;border-radius:50px;font-size:1em;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.cbtn:hover{transform:scale(1.05)}

/* Score bar */
.sbar{display:flex;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.si{background:rgba(255,255,255,.22);backdrop-filter:blur(10px);padding:8px 18px;border-radius:50px;color:#fff;font-size:1em;font-weight:700;border:2px solid rgba(255,255,255,.3)}
.si span{font-size:1.15em}

/* Progress bar */
.prog-wrap{background:rgba(255,255,255,.15);border-radius:50px;height:14px;margin-bottom:16px;overflow:hidden;border:2px solid rgba(255,255,255,.2)}
.prog-bar{height:100%;background:linear-gradient(90deg,#43e97b,#38f9d7);border-radius:50px;transition:width .5s ease}

/* Section label */
.sec-label{text-align:center;color:#fff;margin-bottom:12px;font-size:1.2em;font-weight:700}

/* Question card */
.qcard{background:#fff;border-radius:20px;padding:28px;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,.15);text-align:center;position:relative;overflow:hidden;animation:slideIn .4s ease-out}
.qcard::before{content:'';position:absolute;top:0;right:0;width:6px;height:100%;background:linear-gradient(180deg,#667eea,#764ba2);border-radius:0 20px 20px 0}
.qcard.tb::before{background:linear-gradient(180deg,#f093fb,#f5576c)}

.qnum-badge{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:50%;font-weight:800;font-size:1.1em;margin-bottom:12px}
.qnum-badge.pk{background:linear-gradient(135deg,#f093fb,#f5576c)}
.qtxt{font-size:1.25em;font-weight:600;color:#2d3436;line-height:1.8;margin-bottom:18px}

.qbtns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.ab{border:3px solid;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .2s,box-shadow .2s,background .2s}
.ab:hover{transform:scale(1.1)}.ab:active{transform:scale(.95)}

.lk{padding:12px 32px;border-radius:50px;border-color:#00b894;color:#00b894;background:#e8faf5;font-size:1.15em}
.lk:hover{background:#00b894;color:#fff;box-shadow:0 4px 18px rgba(0,184,148,.4)}
.dl{padding:12px 32px;border-radius:50px;border-color:#e74c3c;color:#e74c3c;background:#fdeaea;font-size:1.15em}
.dl:hover{background:#e74c3c;color:#fff;box-shadow:0 4px 18px rgba(231,76,60,.4)}

.vb{width:72px;height:72px;border-radius:50%;border-color:#00b894;color:#00b894;background:#e8faf5;font-size:1.7em;display:flex;align-items:center;justify-content:center;padding:0}
.vb:hover{background:#00b894;color:#fff;box-shadow:0 5px 20px rgba(0,184,148,.45)}
.xb{width:72px;height:72px;border-radius:50%;border-color:#e74c3c;color:#e74c3c;background:#fdeaea;font-size:1.7em;display:flex;align-items:center;justify-content:center;padding:0}
.xb:hover{background:#e74c3c;color:#fff;box-shadow:0 5px 20px rgba(231,76,60,.45)}

/* Result */
.res-box{margin-top:16px;font-size:1.15em;font-weight:700;padding:12px;border-radius:12px;animation:pop .4s ease-out}
.res-ok{background:#e8faf5;color:#00b894}
.res-no{background:#fdeaea;color:#e74c3c}
.next-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:10px 30px;border-radius:50px;font-size:1.05em;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;transition:transform .2s}
.next-btn:hover{transform:scale(1.06)}

/* Finish */
.fin{text-align:center;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);border-radius:20px;padding:32px;color:#fff;border:2px solid rgba(255,255,255,.3);animation:slideIn .5s ease-out}
.fin h2{font-size:1.9em;margin-bottom:8px}
.fin .fs{font-size:2.5em;font-weight:800;margin:10px 0}
.fin .stars{font-size:2.3em;margin:8px 0}
.rbtn{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;border:none;padding:12px 36px;border-radius:50px;font-size:1.15em;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}
.rbtn:hover{transform:scale(1.06)}

.credit{text-align:center;color:rgba(255,255,255,.5);padding:16px;font-size:.8em}
.cfc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.cfp{position:absolute;top:-20px;border-radius:3px;animation:cfall 3s linear forwards}

@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes slideIn{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .4s ease}
.dots::after{content:'';animation:dt 1.5s infinite}
@keyframes dt{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
</style>
</head>
<body>

<div class="header">
  <h1>📖 שמות פרק ט"ז</h1>
  <h2>פרשת בשלח — המן והשלו</h2>
</div>

<div class="main">
  <!-- Camera -->
  <div class="cam-box">
    <div class="cam-wrap">
      <video id="vid" autoplay playsinline muted></video>
      <canvas id="overlay" width="280" height="210"></canvas>
    </div>
    <div class="gest" id="gd">📷 לחצו להפעלת המצלמה</div>
    <div><button class="cbtn" id="camBtn">🎥 הפעלת מצלמה</button></div>
  </div>

  <!-- Score -->
  <div class="sbar">
    <div class="si">⭐ <span id="sc">0</span> / 15</div>
    <div class="si">📝 שאלה <span id="qn">1</span> / 15</div>
  </div>

  <!-- Progress -->
  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>

  <!-- Section label -->
  <div class="sec-label" id="secLbl">👍👎 חלק א' — לייק או דיסלייק</div>

  <!-- Question area (one at a time) -->
  <div id="qArea"></div>
</div>

<div class="credit">קרדיט: יונתן גילדין</div>
<div class="cfc" id="cfc"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<script>
var ALL=[
// Section A: like/dislike (0-6)
{q:"בני ישראל התלוננו על משה ואהרון במדבר סין כי היו רעבים.",a:!0,t:"A"},
{q:"ה' הוריד את המן מן השמים בערב.",a:!1,t:"A"},
{q:"השלו (ציפור) הגיע למחנה ישראל בערב.",a:!0,t:"A"},
{q:"כל אחד היה צריך ללקוט עומר אחד של מן לכל נפש.",a:!0,t:"A"},
{q:"מי שהשאיר מן עד הבוקר — המן נשאר טרי וטעים.",a:!1,t:"A"},
{q:"ביום שישי לקטו כמות כפולה של מן — לחם משנה.",a:!0,t:"A"},
{q:"בשבת ירד מן מן השמים כרגיל.",a:!1,t:"A"},
// Section B: V/X (7-14)
{q:"בני ישראל יצאו ממצרים ומיד הגיעו למדבר סין.",a:!1,t:"B"},
{q:"בני ישראל אמרו שבמצרים הם ישבו על סיר הבשר ואכלו לחם לשובע.",a:!0,t:"B"},
{q:"ה' אמר למשה שהוא ימטיר לחם מן השמים.",a:!0,t:"B"},
{q:"בני ישראל היו צריכים ללקוט מן בכל יום כמה שהם רוצים ללא הגבלה.",a:!1,t:"B"},
{q:"אהרון אמר לבני ישראל: בערב תדעו כי ה' הוציא אתכם ממצרים.",a:!1,t:"B"},
{q:"המן ירד יחד עם שכבת טל בבוקר.",a:!0,t:"B"},
{q:"מי שליקט הרבה ומי שליקט מעט — לכולם יצא עומר אחד.",a:!0,t:"B"},
{q:"המן שנשמר ליום שבת — הבאיש והתליע.",a:!1,t:"B"}
];

var T=ALL.length,cur=0,score=0,waiting=!1;
var camOn=!1,mH=null,mCam=null,lastG=null,gCnt=0,canGesture=!0;

function showQ(){
  if(cur>=T){showFin();return;}
  var q=ALL[cur],isA=q.t==='A';
  var numInSec=isA?(cur+1):(cur-6);
  var secTotal=isA?7:8;

  // Update labels
  document.getElementById('secLbl').textContent=isA?'👍👎 חלק א\' — לייק או דיסלייק':'✔️✖️ חלק ב\' — וי או איקס';
  document.getElementById('qn').textContent=cur+1;
  document.getElementById('prog').style.width=Math.round(cur/T*100)+'%';

  var html='<div class="qcard'+(isA?'':' tb')+'">';
  html+='<div class="qnum-badge'+(isA?'':' pk')+'">'+numInSec+'</div>';
  html+='<div class="qtxt">'+q.q+'</div>';
  html+='<div class="qbtns" id="btns">';
  if(isA){
    html+='<button class="ab lk" id="btnY">👍 נכון</button>';
    html+='<button class="ab dl" id="btnN">👎 לא נכון</button>';
  }else{
    html+='<button class="ab vb" id="btnY">✔</button>';
    html+='<button class="ab xb" id="btnN">✖</button>';
  }
  html+='</div>';
  html+='<div id="resBox"></div>';
  html+='</div>';

  document.getElementById('qArea').innerHTML=html;
  waiting=!1;canGesture=!0;

  document.getElementById('btnY').onclick=function(){doAns(!0);};
  document.getElementById('btnN').onclick=function(){doAns(!1);};
}

function doAns(v){
  if(waiting)return;
  waiting=!0;canGesture=!1;
  var q=ALL[cur],ok=v===q.a,isA=q.t==='A';
  var card=document.querySelector('.qcard');
  var btns=document.getElementById('btns');
  var bb=btns.querySelectorAll('button');
  for(var i=0;i<bb.length;i++)bb[i].disabled=!0;

  if(ok){
    score++;
    card.style.borderColor='#43e97b';
    card.style.border='3px solid #43e97b';
    var r=document.getElementById('resBox');
    r.className='res-box res-ok';
    r.innerHTML='✅ מעולה! תשובה נכונה!';
    miniCf(card);
  }else{
    card.classList.add('shake');
    card.style.border='3px solid #f5365c';
    var lbl=isA?(q.a?'נכון 👍':'לא נכון 👎'):(q.a?'נכון ✔️':'לא נכון ✖️');
    var r=document.getElementById('resBox');
    r.className='res-box res-no';
    r.innerHTML='❌ טעות! התשובה הנכונה: '+lbl;
  }

  document.getElementById('sc').textContent=score;

  // Next button
  cur++;
  var nb=document.createElement('button');
  nb.className='next-btn';
  nb.textContent=cur<T?'➡️ שאלה הבאה':'🏆 לתוצאות';
  nb.onclick=showQ;
  document.getElementById('resBox').appendChild(document.createElement('br'));
  document.getElementById('resBox').appendChild(nb);
}

function showFin(){
  document.getElementById('secLbl').textContent='🎉 סיימתם!';
  document.getElementById('prog').style.width='100%';
  document.getElementById('qn').textContent=T;

  var pct=Math.round(score/T*100);
  var st,ms;
  if(pct===100){st='🌟🌟🌟🌟🌟';ms='מושלם! אתם מכירים את הפרק בצורה מדהימה!';}
  else if(pct>=80){st='⭐⭐⭐⭐';ms='עבודה מצוינת! כמעט מושלם!';}
  else if(pct>=60){st='⭐⭐⭐';ms='טוב מאוד! נסו שוב לשפר!';}
  else if(pct>=40){st='⭐⭐';ms='לא רע! כדאי לחזור על הפרק!';}
  else{st='⭐';ms='קראו שוב את הפרק ונסו שוב 💪';}

  document.getElementById('qArea').innerHTML=
    '<div class="fin show"><h2>🎉 כל הכבוד!</h2>'+
    '<div class="fs">'+score+' / '+T+' ('+pct+'%)</div>'+
    '<div class="stars">'+st+'</div>'+
    '<p style="font-size:1.15em;margin:8px 0">'+ms+'</p>'+
    '<button class="rbtn" id="rstBtn">🔄 שחקו שוב</button></div>';

  document.getElementById('rstBtn').onclick=function(){
    score=0;cur=0;document.getElementById('sc').textContent='0';showQ();
  };
  bigCf();
}

/* Confetti */
var colors=['#f5365c','#43e97b','#667eea','#ffd93d','#f093fb','#38f9d7','#ff6b6b'];
function bigCf(){var c=document.getElementById('cfc');for(var i=0;i<70;i++){var p=document.createElement('div');p.className='cfp';p.style.cssText='left:'+Math.random()*100+'%;background:'+colors[~~(Math.random()*7)]+';animation-delay:'+Math.random()*2+'s;animation-duration:'+(2+Math.random()*2)+'s;width:'+(8+Math.random()*8)+'px;height:'+(8+Math.random()*8)+'px';c.appendChild(p);}setTimeout(function(){c.innerHTML=''},5000);}
function miniCf(el){var r=el.getBoundingClientRect(),c=document.getElementById('cfc');for(var i=0;i<10;i++){var p=document.createElement('div');p.className='cfp';p.style.cssText='left:'+(r.left+r.width/2+(Math.random()-.5)*80)+'px;top:'+r.top+'px;background:'+colors[~~(Math.random()*4)]+';animation-duration:'+(1+Math.random())+'s;width:9px;height:9px';c.appendChild(p);}}

/* ===== CAMERA ===== */
document.getElementById('camBtn').onclick=function(){camOn?stopCam():startCam()};

function startCam(){
  var gd=document.getElementById('gd');
  gd.innerHTML='📷 מפעיל<span class="dots"></span>';
  navigator.mediaDevices.getUserMedia({video:true}).then(function(stream){
    var vid=document.getElementById('vid');
    vid.srcObject=stream;
    return vid.play();
  }).then(function(){
    camOn=!0;
    document.getElementById('camBtn').textContent='🔴 כיבוי מצלמה';
    gd.innerHTML='⏳ טוען זיהוי<span class="dots"></span>';
    initMP();
  }).catch(function(e){gd.textContent='❌ '+e.message;});
}

function stopCam(){
  var vid=document.getElementById('vid');
  if(vid.srcObject){var t=vid.srcObject.getTracks();for(var i=0;i<t.length;i++)t[i].stop();vid.srcObject=null;}
  if(mCam){mCam.stop();mCam=null;}
  camOn=!1;
  document.getElementById('camBtn').textContent='🎥 הפעלת מצלמה';
  document.getElementById('gd').textContent='📷 המצלמה כבויה';
}

function initMP(){
  if(typeof Hands==='undefined'){document.getElementById('gd').textContent='❌ ספריית זיהוי לא נטענה';return;}
  mH=new Hands({locateFile:function(f){return'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/'+f;}});
  mH.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.6,minTrackingConfidence:.5});
  mH.onResults(onRes);
  var vid=document.getElementById('vid');
  mCam=new Camera(vid,{onFrame:function(){if(mH)return mH.send({image:vid});},width:320,height:240});
  mCam.start().then(function(){
    document.getElementById('gd').textContent='✅ מוכן! הראו 👍 או 👎';
  }).catch(function(){manLoop();document.getElementById('gd').textContent='✅ מוכן! הראו 👍 או 👎';});
}

function manLoop(){
  if(!camOn||!mH)return;var vid=document.getElementById('vid');
  if(vid.readyState>=2)mH.send({image:vid}).then(function(){if(camOn)requestAnimationFrame(manLoop)}).catch(function(){if(camOn)requestAnimationFrame(manLoop)});
  else requestAnimationFrame(manLoop);
}

function onRes(r){
  var cv=document.getElementById('overlay'),cx=cv.getContext('2d');
  cx.clearRect(0,0,280,210);
  if(!r.multiHandLandmarks||!r.multiHandLandmarks.length){
    document.getElementById('gd').innerHTML='🖐️ הראו יד למצלמה';lastG=null;gCnt=0;return;
  }
  var lm=r.multiHandLandmarks[0];
  cx.fillStyle='#43e97b';
  for(var i=0;i<lm.length;i++){cx.beginPath();cx.arc(lm[i].x*280,lm[i].y*210,3,0,6.28);cx.fill();}
  if(typeof drawConnectors!=='undefined')drawConnectors(cx,lm,HAND_CONNECTIONS,{color:'#38f9d7',lineWidth:2});

  var g=gesture(lm);
  if(g&&canGesture){
    if(g===lastG)gCnt++;else{lastG=g;gCnt=1;}
    document.getElementById('gd').innerHTML=g==='up'
      ?'👍 <span style="color:#43e97b">נכון!</span> ('+gCnt+'/15)'
      :'👎 <span style="color:#f5365c">לא נכון!</span> ('+gCnt+'/15)';
    if(gCnt>=15){doAns(g==='up');gCnt=0;lastG=null;}
  }else if(!canGesture){
    // After answering, show waiting message
    document.getElementById('gd').innerHTML='⏸️ לחצו "שאלה הבאה"';
    lastG=null;gCnt=0;
  }else{
    document.getElementById('gd').innerHTML='🖐️ הראו 👍 או 👎';lastG=null;gCnt=0;
  }
}

function gesture(l){
  var tT=l[4],tM=l[2],iM=l[5];
  var iC=l[8].y>l[6].y,mC=l[12].y>l[10].y,rC=l[16].y>l[14].y,pC=l[20].y>l[18].y;
  var cur=iC&&mC&&rC&&pC;
  var ext=Math.abs(tT.x-iM.x)>.05||Math.abs(tT.y-iM.y)>.08;
  if(!ext)return null;
  if(cur||(iC&&mC)){
    if(tT.y<tM.y-.04)return'up';
    if(tT.y>tM.y+.04)return'down';
  }
  return null;
}

showQ();
</script>
</body>
</html>
